<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            background: #0f172a;
            color: white;
            transition: background 0.5s ease;
        }

        .bg-gradient-1 { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .bg-gradient-2 { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
        .bg-gradient-3 { background: linear-gradient(135deg, #164e63 0%, #0891b2 100%); }
        .bg-gradient-4 { background: linear-gradient(135deg, #4c1d95 0%, #7c3aed 100%); }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.2);
        }

        .shortcut-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .clock-shadow {
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Custom Scrollbar for Settings */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 100px; }
        
        .image-icon-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 4px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-gradient-1 min-h-screen flex flex-col items-center justify-center p-6 relative">

    <!-- Top Left: Weather/Date Mockup -->
    <div class="absolute top-8 left-8 flex flex-col space-y-1 fade-in">
        <div id="date-display" class="text-sm font-medium opacity-80 uppercase tracking-widest">Monday, April 24</div>
        <div class="flex items-center space-y-1">
            <span class="text-xl font-light">72°F</span>
            <svg class="w-5 h-5 ml-2 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/></svg>
        </div>
    </div>

    <!-- Main Content -->
    <div class="w-full max-w-5xl text-center z-10">
        <!-- Clock & Greeting -->
        <div class="mb-10 fade-in" style="animation-delay: 0.1s">
            <h1 id="clock" class="text-7xl md:text-8xl font-light tracking-tight clock-shadow mb-2">00:00</h1>
            <p id="greeting" class="text-xl md:text-2xl font-light opacity-90">Good morning, Explorer.</p>
        </div>

        <!-- Search Bar -->
        <div class="w-full max-w-xl mx-auto mb-12 fade-in" style="animation-delay: 0.2s">
            <form id="search-form" class="relative group">
                <input 
                    type="text" 
                    id="search-input"
                    placeholder="Search the web..." 
                    class="w-full glass px-6 py-4 rounded-2xl text-lg search-input transition-all duration-300 pr-16"
                    autocomplete="off"
                >
                <div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center space-x-2 text-white opacity-50">
                    <kbd class="hidden sm:inline-block px-1.5 py-0.5 text-xs font-semibold glass rounded">/</kbd>
                    <button type="submit" class="hover:opacity-100 transition-opacity">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </button>
                </div>
            </form>
        </div>

        <!-- Shortcuts Grid -->
        <div id="shortcuts" class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 fade-in" style="animation-delay: 0.3s">
            <!-- Shortcuts injected by JS -->
        </div>
    </div>

    <!-- Lowered Bottom Bar: Tools & Settings -->
    <div class="absolute bottom-6 w-full px-8 flex flex-col md:flex-row justify-between items-center z-20 space-y-4 md:space-y-0">
        <div class="flex space-x-4">
            <button onclick="toggleTheme()" class="glass px-6 py-3 rounded-full text-sm font-semibold hover:bg-white/10 active:scale-95 transition-all flex items-center shadow-lg">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/></svg>
                Change Style
            </button>
            <button onclick="openSettings()" class="glass px-6 py-3 rounded-full text-sm font-semibold hover:bg-white/10 active:scale-95 transition-all flex items-center shadow-lg">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Settings
            </button>
        </div>
        <div id="quote-display" class="hidden lg:block max-w-sm text-right italic font-light opacity-60">
            "The journey of a thousand miles begins with a single step."
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="glass w-full max-w-md p-8 rounded-3xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold">Preferences</h2>
                <button onclick="closeSettings()" class="opacity-50 hover:opacity-100 p-2">✕</button>
            </div>
            
            <div class="space-y-6 max-h-[70vh] overflow-y-auto pr-2 custom-scroll">
                <div>
                    <label class="block text-xs uppercase tracking-widest opacity-50 mb-2 font-bold">Primary Search Engine</label>
                    <select id="engine-select" class="w-full bg-white/10 border border-white/20 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-white/30 text-white">
                        <option value="google" class="bg-slate-800">Google</option>
                        <option value="duckduckgo" class="bg-slate-800">DuckDuckGo</option>
                        <option value="brave" class="bg-slate-800">Brave Search</option>
                        <option value="bing" class="bg-slate-800">Bing</option>
                        <option value="yandex" class="bg-slate-800">Yandex</option>
                        <option value="baidu" class="bg-slate-800">Baidu</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest opacity-50 mb-2 font-bold">Display Name</label>
                    <input type="text" id="name-input" placeholder="What's your name?" class="w-full bg-white/10 border border-white/20 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-white/30 text-white placeholder-white/30">
                </div>
                <div class="pt-2">
                    <button onclick="saveSettings()" class="w-full bg-white text-slate-900 font-bold py-3 rounded-xl hover:bg-slate-100 active:scale-95 transition-all">Save & Update</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            name: 'Explorer',
            searchEngine: 'google',
            theme: 1,
            shortcuts: [
                { name: 'GitHub', url: 'https://github.com', icon: 'M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.341-3.369-1.341-.454-1.152-1.11-1.458-1.11-1.458-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12c0-5.523-4.477-10-10-10z' },
                { name: 'YouTube', url: 'https://youtube.com', icon: 'M21.582 6.186a2.81 2.81 0 00-1.979-1.978C17.866 3.666 12 3.666 12 3.666s-5.866 0-7.603.542a2.81 2.81 0 00-1.978 1.978C2 7.923 2 11.583 2 11.583s0 3.66 1.419 5.397a2.81 2.81 0 001.978 1.978c1.737.542 7.603.542 7.603.542s5.866 0 7.603-.542a2.81 2.81 0 001.979-1.978C23 15.243 23 11.583 23 11.583s0-3.66-1.418-5.397zM9.545 15.568V7.598l7 3.985-7 3.985z' },
                { name: 'X', url: 'https://x.com', icon: 'M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932 6.064-6.932zm-1.292 19.49h2.039L6.486 3.24H4.298l13.311 17.403z' },
                { name: 'Wikipedia', url: 'https://wikipedia.org', icon: 'https://upload.wikimedia.org/wikipedia/commons/6/63/Wikipedia-logo.png?_=20140817194256' },
                { name: 'Reddit', url: 'https://reddit.com', icon: 'https://redditinc.com/hs-fs/hubfs/Reddit%20Inc/Content/Brand%20Page/Reddit_Logo.png?width=400&height=400&name=Reddit_Logo.png' },
                { name: 'Facebook', url: 'https://facebook.com', icon: 'M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z' },
                { name: 'Gmail', url: 'https://mail.google.com', icon: 'M3 8L12 13L21 8V17H3V8Z M3 6L12 11L21 6V5H3V6Z' },
                { name: 'ChatGPT', url: 'https://chat.openai.com', icon: 'https://pngimg.com/uploads/chatgpt/chatgpt_PNG14.png' },
                { name: 'Spotify', url: 'https://storage.googleapis.com/pr-newsroom-wp/1/2023/05/Spotify_Primary_Logo_RGB_Black-300x300.png' },
                { name: 'Twitch', url: 'https://twitch.tv', icon: 'M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z' },
                { name: 'Instagram', url: 'https://instagram.com', icon: 'M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.668-.072-4.948-.199-4.359-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4.162 4.162 0 110-8.324 4.162 4.162 0 010 8.324zM18.406 3.506a1.44 1.44 0 100 2.88 1.44 1.44 0 000-2.88z' },
                { name: 'Discord', url: 'https://discord.com', icon: 'M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.09 14.09 0 0 0 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.892a.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.157-2.419c1.21 0 2.176 1.086 2.157 2.419c0 1.334-.947 2.419-2.157 2.419zm7.974 0c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.157-2.419c1.21 0 2.176 1.086 2.157 2.419c0 1.334-.946 2.419-2.157 2.419z' }
            ],
            quotes: [
                "Your time is limited, don't waste it living someone else's life.",
                "The only way to do great work is to love what you do.",
                "Innovation distinguishes between a leader and a follower.",
                "Stay hungry, stay foolish.",
                "The future belongs to those who believe in the beauty of their dreams.",
                "Be yourself; everyone else is already taken."
            ]
        };

        function updateClock() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const clockEl = document.getElementById('clock');
            if (clockEl) clockEl.textContent = `${hours}:${minutes}`;

            const dateDisplay = document.getElementById('date-display');
            if (dateDisplay) {
                const options = { weekday: 'long', month: 'long', day: 'numeric' };
                dateDisplay.textContent = now.toLocaleDateString('en-US', options);
            }

            const greetingEl = document.getElementById('greeting');
            if (greetingEl) {
                let greet = "Good evening";
                if (now.getHours() < 12) greet = "Good morning";
                else if (now.getHours() < 18) greet = "Good afternoon";
                greetingEl.textContent = `${greet}, ${state.name}.`;
            }
        }

        function renderShortcuts() {
            const container = document.getElementById('shortcuts');
            if (!container) return;
            
            container.innerHTML = state.shortcuts.map(s => {
                // Safety check: skip or handle if icon is missing
                if (!s.icon) return '';

                // Check if the icon is a URL (starts with http)
                const isImage = typeof s.icon === 'string' && s.icon.startsWith('http');
                const iconHtml = isImage 
                    ? `<div class="image-icon-container"><img src="${s.icon}" class="w-7 h-7 md:w-8 md:h-8 object-contain" alt="${s.name}"></div>`
                    : `<svg class="w-7 h-7 md:w-8 md:h-8 opacity-80" fill="currentColor" viewBox="0 0 24 24"><path d="${s.icon}"/></svg>`;

                return `
                    <a href="${s.url}" target="_blank" class="shortcut-card glass p-4 md:p-5 rounded-2xl flex flex-col items-center justify-center space-y-2 transition-all duration-300">
                        ${iconHtml}
                        <span class="text-[10px] md:text-xs font-medium opacity-70 tracking-wide">${s.name}</span>
                    </a>
                `;
            }).join('');
        }

        function toggleTheme() {
            state.theme = state.theme >= 4 ? 1 : state.theme + 1;
            document.body.className = `bg-gradient-${state.theme} min-h-screen flex flex-col items-center justify-center p-6 relative`;
        }

        function openSettings() {
            const modal = document.getElementById('settings-modal');
            if (modal) {
                modal.classList.remove('hidden');
                document.getElementById('engine-select').value = state.searchEngine;
                document.getElementById('name-input').value = state.name;
            }
        }

        function closeSettings() {
            const modal = document.getElementById('settings-modal');
            if (modal) modal.classList.add('hidden');
        }

        function saveSettings() {
            state.searchEngine = document.getElementById('engine-select').value;
            state.name = document.getElementById('name-input').value || 'Explorer';
            updateClock();
            closeSettings();
        }

        function updateQuote() {
            const quoteEl = document.getElementById('quote-display');
            if (quoteEl) {
                const randomQuote = state.quotes[Math.floor(Math.random() * state.quotes.length)];
                quoteEl.textContent = `"${randomQuote}"`;
            }
        }

        // Search logic
        document.getElementById('search-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;

            let searchUrl = '';
            switch (state.searchEngine) {
                case 'duckduckgo': searchUrl = `https://duckduckgo.com/?q=${encodeURIComponent(query)}`; break;
                case 'brave': searchUrl = `https://search.brave.com/search?q=${encodeURIComponent(query)}`; break;
                case 'yandex': searchUrl = `https://yandex.com/search/?text=${encodeURIComponent(query)}`; break;
                case 'baidu': searchUrl = `https://www.baidu.com/s?wd=${encodeURIComponent(query)}`; break;
                case 'bing': searchUrl = `https://www.bing.com/search?q=${encodeURIComponent(query)}`; break;
                default: searchUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
            window.location.href = searchUrl;
        });

        // Key Listeners
        document.addEventListener('keydown', (e) => {
            if (e.key === '/') {
                if (document.activeElement !== document.getElementById('search-input')) {
                    e.preventDefault();
                    document.getElementById('search-input').focus();
                }
            }
            if (e.key === 'Escape') {
                const searchInput = document.getElementById('search-input');
                if (searchInput) searchInput.blur();
                closeSettings();
            }
        });

        // Initialize
        window.onload = () => {
            setInterval(updateClock, 1000);
            updateClock();
            renderShortcuts();
            updateQuote();
        };
    </script>
</body>
</html>
